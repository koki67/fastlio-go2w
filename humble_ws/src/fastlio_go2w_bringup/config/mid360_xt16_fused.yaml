/**:
    ros__parameters:
        feature_extract_enable: false
        # The fusion node applies the profile-specific MID-360 and XT16
        # downsampling before creating this Livox-compatible message.
        point_filter_num: 1
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./test.pcd"

        common:
            lid_topic: "/livox/lidar_fused"
            imu_topic: "/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            # The fusion node publishes livox_ros_driver2/msg/CustomMsg.
            lidar_type: 1
            # MID-360 uses lines 0-3; XT16 uses lines 4-19.
            scan_line: 20
            blind: 0.5
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree: 360.0
            det_range: 100.0
            extrinsic_est_en: false
            extrinsic_T: [-0.011, -0.02329, 0.04412]
            extrinsic_R: [1., 0., 0.,
                          0., 1., 0.,
                          0., 0., 1.]

        publish:
            path_en: true
            effect_map_en: false
            # Avoid the cumulative /Laser_map copy during long evaluations.
            map_en: false
            scan_publish_en: true
            dense_publish_en: false
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
