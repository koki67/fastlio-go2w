common:
  default_window: fastlio

parameters:
  source: /external/humble_ws/install/setup.bash

windows:
  - name: sensors
    commands:
      - source ${source}
      - ros2 launch fastlio_go2w_bringup sensors.launch.py

  - name: fastlio
    commands:
      - source ${source}
      - ros2 launch fastlio_go2w_bringup bringup.launch.py with_sensors:=false use_rviz:=false
